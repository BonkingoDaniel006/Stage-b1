<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evenements</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Atkinson+Hyperlegible:wght@400;700&display=swap" rel="stylesheet">

</head>
<body>
    <header>
      <div class="nav wrap">
        <a href="{{ url_for('index.index') }}" class="logo">
          <img src="{{ url_for('static', filename='/uploads/logo.png') }}" alt="Logo Autisme Hauts-de-France">
        </a>
        <nav aria-label="Navigation principale">
          <ul>
            <li><a href="{{ url_for('index.index') }}#mission">Notre mission</a></li>
            <li><a href="{{ url_for('index.index') }}#actions">Nos actions</a></li>
            <li><a href="{{ url_for('index.index') }}#temoignages">Témoignages</a></li>
            <li><a href="{{ url_for('index.index') }}#ressources">Ressources</a></li>
            <li><a href="{{ url_for('index.index') }}#contact">Contact</a></li>
            <li><a href="{{ url_for('index.evenements') }}">Événements</a></li>
          </ul>
        </nav>
        <a href="https://paypal.me/DanielBokingo" class="nav-cta" target="_blank" rel="noopener noreferrer"><i class="fa-solid fa-hand-holding-heart"></i> Faire un don</a>
      </div>
    </header>
    <main class="main-content">
        <h2 class="section-title">Événements à venir</h2>

        <div class="events-grid">
            {% for event in events %}
            <a href="{{ url_for('index.evenement', event_id=event.id) }}">
               <div class="event-card">
                <div class="event-image">
                    <img src="{{ event.image_url }}" alt="Image de l'événement {{ event.title }}">
                </div>
                <div class="event-details">
                    <div class="event-date">{{ event.event_date }}</div>
                    <h3 class="event-title">{{ event.title }}</h3>
                    <div class="event-info-row">
                        <span><i class="fa-solid fa-map-marker-alt"></i></span> {{ event.location }}
                    </div>
                    <div class="event-info-row">
                        <span><i class="fa-solid fa-users"></i></span> Organisé par : {{ event.organizer }}
                    </div>
                    <div class="event-footer">
                        <span style="color: #2ecc71; font-weight: 500;">{{ event.price_info }}</span>
                        
                    </div>
                </div>
            </div> 
            </a>
            
            {% endfor %}

            

        </div>
    </main>
    
</body>
</html>
